<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</title>
  <link rel="icon" type="image/x-icon" href="{{ '/assets/favicon.ico' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/colors_and_type.css' | relative_url }}">
  <style>
    /* ── Layout ── */
    body {
      font-family: var(--font-body);
      font-size: var(--fs-body);
      line-height: var(--lh-relax);
      color: var(--fg);
      background: var(--bg);
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }

    /* ── Headings ── */
    h1, h2, h3, h4, h5, h6 {
      font-family: var(--font-display);
      color: var(--oc-marine);
      font-weight: var(--fw-light);
      line-height: var(--lh-tight);
      letter-spacing: var(--tracking-tight);
      margin-top: 1.6em;
      margin-bottom: 0.4em;
    }
    h1 { font-size: var(--fs-h1); border-bottom: 2px solid var(--oc-primary-200); padding-bottom: 0.3em; }
    h2 { font-size: var(--fs-h2); border-bottom: 1px solid var(--border); padding-bottom: 0.2em; }
    h3 { font-size: var(--fs-h3); }
    h4 { font-size: var(--fs-h4); font-weight: var(--fw-semibold); }

    /* ── Body text ── */
    p {
      text-align: justify;
      margin: 0.75em 0;
    }

    /* ── Links ── */
    a {
      color: var(--link);
      text-decoration: none;
      transition: color var(--dur-fast) var(--ease-standard);
    }
    a:hover { text-decoration: underline; color: var(--oc-primary-800); }

    /* ── Horizontal rule ── */
    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2em 0;
    }

    /* ── Tables ── */
    table {
      border-collapse: collapse;
      margin: 1.2em auto;
      width: 100%;
      font-size: var(--fs-body-sm);
      box-shadow: var(--shadow-sm);
      border-radius: var(--r-md);
      overflow: hidden;
    }
    thead tr {
      background: var(--oc-marine);
      color: var(--oc-white);
      font-family: var(--font-display);
      font-weight: var(--fw-semibold);
      font-size: var(--fs-body-sm);
      letter-spacing: var(--tracking-wide);
      text-transform: uppercase;
    }
    th {
      padding: 10px 14px;
      text-align: left;
      border: none;
    }
    td {
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:nth-child(even) { background: var(--oc-mist); }
    tbody tr:hover { background: var(--oc-primary-50); }

    /* ── Images ── */
    img {
      display: block;
      margin-left: auto;
      margin-right: auto;
      max-width: 100%;
      height: auto;
      border-radius: var(--r-md);
    }

    /* ── Code ── */
    pre {
      background: var(--oc-mist);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: var(--s-4);
      overflow: auto;
      font-family: var(--font-mono);
      font-size: var(--fs-body-sm);
    }
    code {
      font-family: var(--font-mono);
      font-size: 0.9em;
      background: var(--oc-mist);
      border: 1px solid var(--border);
      border-radius: var(--r-xs);
      padding: 1px 5px;
    }
    pre code { background: none; border: none; padding: 0; }

    /* ── Bold / strong in tables ── */
    td strong, td b { color: var(--oc-marine); }

    /* ── Figure captions (bold paragraphs after images) ── */
    p strong:first-child { color: var(--fg-2); }
  </style>
</head>
<body>
  {{ content }}
</body>
</html>
