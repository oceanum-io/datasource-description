    (function() {

        function tooltipHtml(name) {

        }

        // ── Global domains: added first so they sit below regional layers ────
        var globalLayer = L.geoJSON({"type": "FeatureCollection", "features": []}, {
            style: function() {

                        color:"#999", weight:1.0, dashArray:"6 4"};
